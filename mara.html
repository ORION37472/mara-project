<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paisaje con estrellas descendentes</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to top, #00ffcc 0%, #cc00ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* 🌙 Luna */
    .moon {
      position: absolute;
      top: 100px;
      left: 100px;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle at 30% 30%, #fff 40%, #ddd 70%, #aaa 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px 20px rgba(255, 255, 200, 0.4);
      z-index: 2;
      cursor: pointer;
      transition: transform 0.3s ease;
      animation: moonGlow 5s ease-in-out infinite alternate;
    }

    .moon:hover { transform: scale(1.1); }

    @keyframes moonGlow {
      from { box-shadow: 0 0 30px 10px rgba(255, 255, 200, 0.3); }
      to { box-shadow: 0 0 60px 25px rgba(255, 255, 200, 0.6); }
    }

    /* 🌄 Montañas */
    .mountains {
      position: absolute;
      bottom: 48%;
      width: 100%;
      height: 25%;
      z-index: 3;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: 250px solid transparent;
      border-right: 250px solid transparent;
      border-bottom: 200px solid #5b0080;
      opacity: 0.95;
    }

    .m0 { left: -5%; border-bottom-color: #29004d; }
    .m1 { left: 20%; border-bottom-color: #3b0066; }
    .m2 { left: 50%; border-bottom-color: #4f007f; }
    .m3 { left: 75%; border-bottom-color: #6600b2; }

    /* 🌿 Suelo */
    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 48%;
      background: linear-gradient(180deg, #022d16 0%, #011909 100%);
      z-index: 1;
    }

    /* 🛣️ Carretera */
    .road-wrap {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 60%;
      height: 48%;
      transform: translateX(-50%);
      z-index: 5;
    }

    .road {
      position: relative;
      width: 100%;
      height: 100%;
      clip-path: polygon(48% 0, 52% 0, 100% 100%, 0% 100%);
      background: linear-gradient(180deg, #2b2b2b 0%, #151515 100%);
      box-shadow: 0 10px 80px rgba(0,0,0,0.6) inset;
    }

    .side-line {
      position: absolute;
      width: 4px;
      height: 100%;
      background: #00ffff;
      box-shadow: 0 0 15px 4px #00ffff;
      top: 0;
    }

    .side-left { left: 10%; }
    .side-right { right: 10%; }

    .dash {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 6%;
      height: 6%;
      background: #ffd;
      border-radius: 3px;
    }

    .dash.d1 { bottom: 10%; transform: translateX(-50%) scale(1.6); }
    .dash.d2 { bottom: 20%; transform: translateX(-50%) scale(1.3); }
    .dash.d3 { bottom: 32%; transform: translateX(-50%) scale(1.1); }
    .dash.d4 { bottom: 44%; transform: translateX(-50%) scale(0.9); }
    .dash.d5 { bottom: 56%; transform: translateX(-50%) scale(0.7); opacity: 0.85; }

    /* ✨ Estrellas fijas */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 52%;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.6); }
    }

    /* 🌠 Estrellas fugaces descendentes */
    .shooting-star {
      position: absolute;
      width: 130px;
      height: 2px;
      background: linear-gradient(90deg, white, transparent);
      opacity: 0.9;
      border-radius: 50%;
      transform: rotate(45deg);
      animation: shootDown 2.5s linear forwards;
      z-index: 2;
      filter: blur(1px);
      pointer-events: none;
    }

    @keyframes shootDown {
      0% { opacity: 1; transform: translate(0, 0) rotate(45deg); }
      100% { opacity: 0; transform: translate(400px, 300px) rotate(45deg); }
    }

    /* 💬 Texto “te amo marbella” */
    .love-text {
      position: absolute;
      top: 130px;
      left: 230px;
      font-size: 2rem;
      color: #ff99ff;
      text-shadow: 0 0 10px #ff66ff, 0 0 25px #ff00ff;
      opacity: 0;
      transform: translateY(-30px);
      z-index: 20;
      font-family: "Poppins", sans-serif;
      font-weight: bold;
      letter-spacing: 3px;
      pointer-events: none;
      transition: all 1s ease;
    }

    .love-text.show {
      opacity: 1;
      transform: translateY(10px);
      animation: glowPulse 1.5s infinite alternate;
    }

    @keyframes glowPulse {
      from { text-shadow: 0 0 10px #ff66ff, 0 0 20px #ff33ff, 0 0 40px #ff00ff; }
      to { text-shadow: 0 0 20px #ff99ff, 0 0 50px #ff33ff, 0 0 80px #ff00ff; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="moon" id="moon"></div>
    <div class="love-text" id="loveText">te amo marbella</div>

    <div class="mountains">
      <div class="mountain m0"></div>
      <div class="mountain m1"></div>
      <div class="mountain m2"></div>
      <div class="mountain m3"></div>
    </div>

    <div class="road-wrap">
      <div class="road">
        <div class="side-line side-left"></div>
        <div class="side-line side-right"></div>
        <div class="dash d1"></div>
        <div class="dash d2"></div>
        <div class="dash d3"></div>
        <div class="dash d4"></div>
        <div class="dash d5"></div>
      </div>
    </div>

    <div class="ground"></div>
  </div>

  <script>
    // 🌟 Estrellas fijas
    const starsContainer = document.querySelector('.stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = (Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }

    // 🌙 Texto al tocar la luna
    const moon = document.getElementById('moon');
    const text = document.getElementById('loveText');
    let visible = false;
    moon.addEventListener('click', () => {
      visible = !visible;
      text.classList.toggle('show', visible);
    });

    // 🌠 Estrellas fugaces descendentes (solo en el cielo)
    function createShootingStar() {
      const skyHeight = window.innerHeight * 0.52; // límite del cielo
      const startX = Math.random() * window.innerWidth;
      const startY = Math.random() * (skyHeight * 0.5); // solo parte superior del cielo

      const star = document.createElement('div');
      star.className = 'shooting-star';
      star.style.left = `${startX}px`;
      star.style.top = `${startY}px`;

      document.body.appendChild(star);
      setTimeout(() => star.remove(), 2500);
    }

    // 🌌 Lanzar estrellas fugaces solo dentro del cielo
    setInterval(() => {
      if (Math.random() > 0.6) createShootingStar();
    }, 2500);
  </script>
